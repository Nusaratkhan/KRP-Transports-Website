<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preloader Test</title>
  <style>
    /* Preloader Background */
    .preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #053047; /* dark blue background */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* Dots Loader */
    .dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .dots div {
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      animation: bounce 0.6s infinite alternate;
    }

    .dots div:nth-child(2) {
      animation-delay: 0.2s;
    }
    .dots div:nth-child(3) {
      animation-delay: 0.4s;
    }
    .dots div:nth-child(4) {
      animation-delay: 0.6s;
    }

    @keyframes bounce {
      from {
        transform: translateY(0);
        opacity: 0.3;
      }
      to {
        transform: translateY(-15px);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <!-- Preloader -->
  <div class="preloader">
    <div class="dots">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
</body>
</html>
